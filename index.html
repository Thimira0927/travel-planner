<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Travel Planner Pro</title>

<link rel="stylesheet" href="style.css">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop id="bg-video">
  <source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<div class="container">

<h1>🌍 Travel Planner</h1>

<!-- LOGIN -->
<div id="auth-box">
  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="search-box">
  <input id="start" placeholder="Start">
  <input id="destination" placeholder="Destination">
  <input id="days" type="number" placeholder="Days">
  <input id="startDate" type="date">
</div>

<div class="top-buttons">
  <button onclick="planTrip()">Plan</button>
  <button onclick="clearTrips()">Clear</button>
  <button onclick="toggleTheme()">Theme</button>
  <button onclick="toggleMusic()">Music</button>
  <button onclick="downloadPDF()">PDF</button>

  <button onclick="showRoute()">Route</button>
  <button onclick="getSuggestion()">AI Plan</button>
  <button onclick="getCurrentLocation()">My Location</button>

  <button onclick="logout()">Logout</button>
</div>

<p id="error"></p>
<h3 id="tripCount"></h3>

<div id="result"></div>

<!-- WEATHER -->
<div id="weatherBox"></div>

<!-- AI RESULT -->
<div id="aiResult"></div>

<!-- MAP -->
<div id="map"></div>

</div>
</div>

<!-- MUSIC -->
<audio id="bg-music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- FIREBASE -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_DNA69gwDLbHIUqYxMqC5h85uiqYzrfs",
  authDomain: "travel---planner.firebaseapp.com",
  projectId: "travel---planner"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user => {
  document.getElementById("auth-box").style.display = user ? "none" : "block";
  document.getElementById("app").style.display = user ? "block" : "none";
});
</script>

<!-- GOOGLE MAP -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBnXXGPeMIhQ1KvzgeBOoEF6FMk1ph46lA&libraries=places&callback=initMap">
</script>

<script>
const WEATHER_API = "0c2d1ffade57eaa1ad12b6c3eb3f5f82";
const GEMINI_API =  "AIzaSyAQzfVBDL8wEIJ9i4pxTPqdU0Hfu9zZ0E4";

let map, marker, directionsService, directionsRenderer;

// ================= MAP =================
function initMap() {
  const loc = { lat: 7.8731, lng: 80.7718 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: loc,
    zoom: 7
  });

  marker = new google.maps.Marker({ position: loc, map });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer();
  directionsRenderer.setMap(map);

  new google.maps.places.Autocomplete(start);
  new google.maps.places.Autocomplete(destination);
}

// ================= AUTH =================
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => showError(e.message));
}

function signup() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .catch(e => showError(e.message));
}

function logout() {
  auth.signOut();
}

// ================= PLAN =================
async function planTrip() {
  const dest = destination.value;
  const days = document.getElementById("days").value;

  if (!dest || !days) return showError("Enter details!");

  document.getElementById("result").innerHTML += `
  <div class="card">
    <img src="https://source.unsplash.com/400x300/?${dest}">
    <h2>${dest}</h2>
    <p>⏳ ${days} days</p>
    <button onclick="showLocation('${dest}')">📍 Map</button>
  </div>
  `;

  loadWeather(dest);
}

// ================= WEATHER =================
async function loadWeather(city) {
  const box = document.getElementById("weatherBox");

  let res = await fetch(
    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${"0c2d1ffade57eaa1ad12b6c3eb3f5f82"}&units=metric`
  );

  let data = await res.json();

  if (!data.main) return;

  box.innerHTML = `
    <div class="card">
      <h3>🌦️ ${city}</h3>
      <p>🌡️ ${data.main.temp}°C</p>
      <p>☁️ ${data.weather[0].main}</p>
    </div>
  `;
}

// ================= ROUTE =================
function showRoute() {
  directionsService.route({
    origin: start.value,
    destination: destination.value,
    travelMode: "DRIVING"
  }, (res, status) => {
    if (status === "OK") directionsRenderer.setDirections(res);
  });
}

// ================= MAP LOCATION =================
async function showLocation(city) {
  let res = await fetch(
    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${"0c2d1ffade57eaa1ad12b6c3eb3f5f82"}`
  );

  let data = await res.json();

  if (!data.coord) return;

  let pos = { lat: data.coord.lat, lng: data.coord.lon };

  map.setCenter(pos);
  map.setZoom(12);
  marker.setPosition(pos);
}

// ================= AI =================
async function getSuggestion() {
  const box = document.getElementById("aiResult");

  box.style.display = "block";
  box.innerHTML = "🤖 Generating plan...";

  let res = await fetch(
    `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${ "AIzaSyAQzfVBDL8wEIJ9i4pxTPqdU0Hfu9zZ0E4"}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{
          parts: [{
            text: `Create a detailed day-by-day travel plan for ${destination.value}`
          }]
        }]
      })
    }
  );

  let data = await res.json();
  let text = data?.candidates?.[0]?.content?.parts?.[0]?.text;

  box.innerHTML = text.replace(/\n/g, "<br>");
}

// ================= LOCATION =================
function getCurrentLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    let loc = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };

    map.setCenter(loc);
    marker.setPosition(loc);
  });
}

// ================= OTHER =================
function toggleTheme() {
  document.body.classList.toggle("light-mode");
}

function toggleMusic() {
  const m = document.getElementById("bg-music");
  m.paused ? m.play() : m.pause();
}

function downloadPDF() {
  html2pdf().from(document.body).save();
}

function clearTrips() {
  document.getElementById("result").innerHTML = "";
}

function showError(msg) {
  error.innerText = msg;
  setTimeout(() => error.innerText = "", 3000);
}
</script>

</body>
</html>
