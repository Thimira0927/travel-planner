<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Travel Planner</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎬 BACKGROUND -->
<video autoplay muted loop id="bg-video">
  <source src="video.mp4" type="video/mp4">
</video>

<!-- 🎵 MUSIC -->
<audio id="bg-music" loop preload="auto">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- 🔐 LOGIN -->
<div id="auth-box" class="card" style="max-width:300px; margin:auto;">
  <h2>🔐 Login</h2>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <p id="auth-error" style="color:red;"></p>
</div>

<!-- 🌍 APP -->
<div id="app" style="display:none;">

<h1>🌍 Travel Planner</h1>

<div class="search-box">
  <input type="text" id="start" placeholder="Start location">
  <input type="text" id="destination" placeholder="Destination">
  <input type="number" id="days" placeholder="Days">
</div>

<div class="top-buttons">
  <button onclick="planTrip()">➕ Plan</button>
  <button onclick="clearTrips()">🗑️ Clear</button>
  <button onclick="toggleTheme()">🌙 Theme</button>
  <button onclick="toggleMusic()">🎵 Music</button>
  <button onclick="getCurrentLocation()">📍 My Location</button>

  <button onclick="showRoute()">🗺️ Route</button>
  <button onclick="findPlaces('restaurant')">🍴 Food</button>
  <button onclick="findPlaces('lodging')">🏨 Hotels</button>

  <!-- 🔥 NEW FEATURES -->
  <button onclick="getSuggestion()">🤖 AI Tips</button>
  <button onclick="downloadPDF()">📄 PDF</button>

  <button onclick="logout()">🚪 Logout</button>
</div>

<h3 id="tripCount"></h3>
<p id="error" style="color:red;"></p>

<!-- 🤖 AI RESULT BOX (IMPORTANT FIX) -->
<div id="aiResult" class="card" style="display:none; margin-top:20px;"></div>

<!-- 🧳 TRIPS -->
<div id="result"></div>

<!-- 🗺️ MAP -->
<div id="map"></div>

</div>

<!-- ✅ FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<!-- ✅ INIT FIREBASE -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_DNA69gwDLbHIUqYxMqC5h85uiqYzrfs",
  authDomain: "travel---planner.firebaseapp.com",
  projectId: "travel---planner",
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

window.auth = firebase.auth();
window.db = firebase.firestore();
</script>

<!-- ✅ PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<!-- ✅ MAIN SCRIPT -->
<script src="script.js"></script>

<!-- 🔐 AUTH -->
<script>

window.signup = function () {
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!email || !password) return showAuthError("Enter email & password");

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => showAuthError("Account created ✅"))
    .catch(err => showAuthError(err.message));
};

window.login = function () {
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!email || !password) return showAuthError("Enter email & password");

  auth.signInWithEmailAndPassword(email, password)
    .then(() => showAuthError(""))
    .catch(err => showAuthError(err.message));
};

window.logout = function () {
  auth.signOut();
};

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("auth-box").style.display = "none";
    document.getElementById("app").style.display = "block";

    if (typeof displayTrips === "function") displayTrips();

  } else {
    document.getElementById("auth-box").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

function showAuthError(msg) {
  document.getElementById("auth-error").innerText = msg;
}
</script>

<!-- 🌍 GOOGLE MAP -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC0B36Hn9aFtnE7O-9fsJvxyaKQxANA04M&libraries=places&callback=initMap">
</script>

</body>
</html>
