<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Travel Planner</title>

<link rel="stylesheet" href="style.css">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
}
#map {
  height: 400px;
  width: 90%;
  margin: 20px auto;
  border-radius: 10px;
}
</style>

</head>

<body>

<h1>🌍 Travel Planner</h1>

<!-- LOGIN -->
<div id="auth-box">
  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="search-box">
  <input id="start" placeholder="Start">
  <input id="destination" placeholder="Destination">
  <input id="days" type="number" placeholder="Days">
  <input id="startDate" type="date">
</div>

<div class="buttons">
  <button onclick="planTrip()">Plan</button>
  <button onclick="clearTrips()">Clear</button>
  <button onclick="toggleTheme()">Theme</button>
  <button onclick="toggleMusic()">Music</button>
  <button onclick="downloadPDF()">PDF</button>
  <button onclick="logout()">Logout</button>
</div>

<p id="error"></p>
<div id="result"></div>
<div id="map"></div>

</div>

<!-- Music -->
<audio id="bg-music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- Firebase Config -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_DNA69gwDLbHIUqYxMqC5h85uiqYzrfs",
  authDomain: "travel---planner.firebaseapp.com",
  projectId: "travel---planner",
  storageBucket: "travel---planner.appspot.com",
  messagingSenderId: "123456789", 
  appId: "1:123456789:web:abc123"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
</script>

<!-- Google Maps -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCh56XNMWu9ZZATyj-7-oEyn1Wk_K4yTlY&libraries=places&callback=initMap">
</script>

<!-- SCRIPT -->
<script>
let map;

// MAP LOAD
function initMap() {
  const loc = { lat: 7.8731, lng: 80.7718 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: loc,
    zoom: 7
  });
}

// LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("auth-box").style.display = "none";
      document.getElementById("app").style.display = "block";
    })
    .catch(err => alert(err.message));
}

// SIGNUP
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Signup success"))
    .catch(err => alert(err.message));
}

// LOGOUT
function logout() {
  auth.signOut().then(() => location.reload());
}

// SIMPLE FEATURES
function planTrip() {
  const start = document.getElementById("start").value;
  const dest = document.getElementById("destination").value;
  const days = document.getElementById("days").value;

  document.getElementById("result").innerHTML =
    `<h3>Trip: ${start} → ${dest}</h3><p>Days: ${days}</p>`;
}

function clearTrips() {
  document.getElementById("result").innerHTML = "";
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

function toggleMusic() {
  const music = document.getElementById("bg-music");
  music.paused ? music.play() : music.pause();
}

function downloadPDF() {
  html2pdf().from(document.body).save("travel-plan.pdf");
}
</script>

</body>
</html>
