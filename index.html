<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Travel Planner Pro</title>

<link rel="stylesheet" href="style.css">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- 🎬 VIDEO -->
<video autoplay muted loop id="bg-video">
  <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<div class="container">

<h1>🌍 Travel Planner</h1>

<!-- 🔐 LOGIN -->
<div id="auth-box">
  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button type="button" onclick="login()">Login</button>
  <button type="button" onclick="signup()">Signup</button>
</div>

<!-- 🌍 APP -->
<div id="app" style="display:none;">

<div class="search-box">
  <input id="start" placeholder="Start location">
  <input id="destination" placeholder="Destination">
  <input id="days" type="number" placeholder="Days">
  <input id="startDate" type="date">
  <input id="budget" type="number" placeholder="Budget per day">
</div>

<div class="top-buttons">
  <button type="button" onclick="planTrip()">Plan</button>
  <button type="button" onclick="clearTrips()">Clear</button>
  <button type="button" onclick="toggleTheme()">Theme</button>
  <button type="button" onclick="toggleMusic()">Music</button>
  <button type="button" onclick="downloadPDF()">PDF</button>

  <button type="button" onclick="showRoute()">🧭 Route</button>
  <button type="button" onclick="getSuggestion()">🤖 AI Plan</button>
  <button type="button" onclick="getCurrentLocation()">📍 My Location</button>

  <button type="button" onclick="findPlaces('hotel')">🏨 Hotels</button>
  <button type="button" onclick="findPlaces('restaurant')">🍔 Food</button>
  <button type="button" onclick="calculateCost()">💰 Cost</button>

  <button type="button" onclick="logout()">Logout</button>
</div>

<p id="error"></p>
<h3 id="tripCount"></h3>

<div id="result"></div>

<div id="weatherBox"></div>
<div id="aiResult"></div>
<p id="costResult"></p>

<div id="map"></div>

</div>
</div>

<!-- 🎵 MUSIC -->
<audio id="bg-music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- 🔥 FIREBASE CONFIG (FULL FIX) -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_DNA69gwDLbHIUqYxMqC5h85uiqYzrfs",
  authDomain: "travel---planner.firebaseapp.com",
  projectId: "travel---planner",
  storageBucket: "travel---planner.appspot.com",
  messagingSenderId: "123456789",   // ⚠️ replace from Firebase console
  appId: "1:123456789:web:abcdef"   // ⚠️ replace from Firebase console
};

firebase.initializeApp(firebaseConfig);

// GLOBAL
window.auth = firebase.auth();
window.db = firebase.firestore();

// AUTH UI SWITCH
window.auth.onAuthStateChanged(user => {
  document.getElementById("auth-box").style.display = user ? "none" : "block";
  document.getElementById("app").style.display = user ? "block" : "none";
});
</script>

<!-- 🌍 GOOGLE MAP -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBnXXGPeMIhQ1KvzgeBOoEF6FMk1ph46lA&libraries=places&callback=initMap"
onerror="alert('Map failed to load ❌')">
</script>

<!-- 🚀 MAIN SCRIPT -->
<script src="script.js"></script>

</body>
</html>
