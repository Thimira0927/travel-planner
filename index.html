<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Travel Planner</title>

<link rel="stylesheet" href="style.css">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>

<body>

<h1>🌍 Travel Planner</h1>

<!-- LOGIN -->
<div id="auth-box">
  <input id="email" placeholder="Email"><br>
  <input id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="search-box">
  <input id="start" placeholder="Start">
  <input id="destination" placeholder="Destination">
  <input id="days" type="number" placeholder="Days">
  <input id="startDate" type="date">
</div>

<div class="buttons">
  <button onclick="planTrip()">Plan</button>
  <button onclick="clearTrips()">Clear</button>
  <button onclick="toggleTheme()">Theme</button>
  <button onclick="toggleMusic()">Music</button>
  <button onclick="getSuggestion()">AI</button>
  <button onclick="showRoute()">Route</button>
  <button onclick="findPlaces('restaurant')">Food</button>
  <button onclick="findPlaces('lodging')">Hotels</button>
  <button onclick="downloadPDF()">PDF</button>
  <button onclick="logout()">Logout</button>
</div>

<p id="error"></p>
<h3 id="tripCount"></h3>

<div id="aiResult"></div>
<div id="result"></div>
<div id="map"></div>

</div>

<audio id="bg-music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- Firebase Config -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_DNA69gwDLbHIUqYxMqC5h85uiqYzrfs",
  authDomain: "travel---planner.firebaseapp.com",
  projectId: "travel---planner",
};

firebase.initializeApp(firebaseConfig);
window.auth = firebase.auth();
window.db = firebase.firestore();
</script>

<!-- Google Map -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCh56XNMWu9ZZATyj-7-oEyn1Wk_K4yTlY&libraries=places&callback=initMap">
</script>

<script src="script.js"></script>

</body>
</html>
