<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Travel Planner Pro</title>

<link rel="stylesheet" href="style.css">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop id="bg-video">
  <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<div class="container">

<h1>🌍 Travel Planner</h1>

<!-- LOGIN -->
<div id="auth-box">
  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="search-box">
  <input id="start" placeholder="Start">
  <input id="destination" placeholder="Destination">
  <input id="days" type="number" placeholder="Days">
  <input id="startDate" type="date">
</div>

<div class="top-buttons">
  <button onclick="planTrip()">Plan</button>
  <button onclick="clearTrips()">Clear</button>
  <button onclick="toggleTheme()">Theme</button>
  <button onclick="toggleMusic()">Music</button>
  <button onclick="downloadPDF()">PDF</button>
  <button onclick="logout()">Logout</button>
</div>

<p id="error"></p>
<h3 id="tripCount"></h3>

<div id="result"></div>
<div id="map"></div>

</div>

</div>

<!-- MUSIC -->
<audio id="bg-music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- FIREBASE CONFIG -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_DNA69gwDLbHIUqYxMqC5h85uiqYzrfs",
  authDomain: "travel---planner.firebaseapp.com",
  projectId: "travel---planner",
  storageBucket: "travel---planner.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abc123"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// AUTO LOGIN UI SWITCH
auth.onAuthStateChanged(user => {
  document.getElementById("auth-box").style.display = user ? "none" : "block";
  document.getElementById("app").style.display = user ? "block" : "none";
});
</script>

<!-- GOOGLE MAP -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBnXXGPeMIhQ1KvzgeBOoEF6FMk1ph46lA&libraries=places&callback=initMap">
</script>

<!-- SCRIPT -->
<script>
let map;

// MAP
function initMap() {
  const loc = { lat: 7.8731, lng: 80.7718 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: loc,
    zoom: 7
  });
}

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(err => showError(err.message));
}

// SIGNUP
function signup() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(() => showError("Signup success ✅"))
    .catch(err => showError(err.message));
}

// LOGOUT
function logout() {
  auth.signOut();
}

// PLAN
function planTrip() {
  if (!destination.value || !days.value) {
    return showError("Enter details!");
  }

  result.innerHTML = `
    <div class="card">
      <h2>${destination.value}</h2>
      <p>📅 ${startDate.value}</p>
      <p>⏳ ${days.value} days</p>
    </div>
  `;
}

// CLEAR
function clearTrips() {
  result.innerHTML = "";
}

// THEME FIXED
function toggleTheme() {
  document.body.classList.toggle("light-mode");
}

// MUSIC
function toggleMusic() {
  bgMusic = document.getElementById("bg-music");
  bgMusic.paused ? bgMusic.play() : bgMusic.pause();
}

// PDF
function downloadPDF() {
  html2pdf().from(document.body).save("travel-plan.pdf");
}

// ERROR
function showError(msg) {
  error.innerText = msg;
  setTimeout(() => error.innerText = "", 3000);
}
</script>

</body>
</html>
